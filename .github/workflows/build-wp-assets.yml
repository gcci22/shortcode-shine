name: Build WordPress Assets

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint PHP (fail build on parse error)
        run: php -l versace22-enqueue.php

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build assets for WordPress
        run: npm run build:wp

      - name: Prepare WP files
        run: |
          mkdir -p wp-export
          cp wordpress-assets/Assets/index.js wp-export/index.js
          find wordpress-assets/Assets -name "*.css" -exec cp {} wp-export/index.css \;
          cp versace22-enqueue.php wp-export/versace22-enqueue.php

      - name: Upload WordPress files
        uses: actions/upload-artifact@v4
        with:
          name: wordpress-assets
          path: |
            wp-export/index.js
            wp-export/index.css
            wp-export/versace22-enqueue.php
